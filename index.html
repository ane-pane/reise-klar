function useStore(key, init) {
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : init; } catch { return init; }
  });
  const set = v => { const n = typeof v === "function" ? v(val) : v; setVal(n); try { localStorage.setItem(key, JSON.stringify(n)); } catch {} };
  return [val, set];
}

const ICON_KEYS = Object.keys(ICON_DEFS);

function TripIcon({iconKey,size=44,a=DT_A,b=DT_B}){
  const def=ICON_DEFS[iconKey]||ICON_DEFS.house;
  return <div style={{width:size,height:size,flexShrink:0}}>{def.render(a,b)}</div>;
}

const DEFAULT_TRIP_TYPES=[
  {id:"overnight",name:"Overnatting",icon:"house"},
  {id:"city",name:"By",icon:"city"},
  {id:"tenting",name:"Telttur",icon:"mountain"},
  {id:"backpack",name:"Ryggsekktur",icon:"backpack"},

];

function buildCats(tripTypeId,season,days){
  const w=season==="Vinter",hike=tripTypeId==="tenting",bp=tripTypeId==="backpack";
  const city=tripTypeId==="city",road=tripTypeId==="roadtrip",overnight=tripTypeId==="overnight";
  const noTent=!hike;
  const I=t=>({id:uid(),text:t,checked:false});
  return [
    {id:"clothes",label:"Kle",items:[
      I(w?"Ull-undertrøye":"T-skjorter / skjorter"),
      I(w?"Ullstilongs":"Lette bukser / shorts"),
      I(w?"Varmt mellomlag":"Lett jakke eller hettejakke"),
      I(w?"Varm kåpe":"Regnjakke"),
      I(`Truser (${days+1} par)`),
      I(`Sokkar (${days+1} par)`),
      I("Pysj e.l."),
      ...(noTent?[I("Tur/treningstøy"),I("Treningsbh")]:[]),
      ...(city?[I("Finare antrekk til middag/kveld")]:[]),
      ...(hike||bp?[I("Turbukser"),I("Tursko / fjelløvlar")]:[]),
      ...(w&&(hike||bp)?[I("Dunjakke"),I("Varm lue"),I("Hanskar"),I("Halsrøyr")]:[]),
    ]},
    {id:"toiletries",label:"Toalettsaker",items:[
      I("Tannbørste & tannkrem"),I("Deodorant"),I("Sjampo & såpe"),I("Briller"),
      I(days<=3?"Kontaktlinseveske (lita flaske)":"Kontaktlinseveske (stor flaske)"),
      I("Kontaktlinseboks / -brett"),
      ...(w?[]:[I("Solkrem")]),
      ...(hike||bp?[I("Gnagsårplaster"),I("Enkelt førstehjelpsett"),I("Myggmiddel")]:[]),
    ]},
    {id:"gear",label:"Utstyr",items:[
      ...(hike?[I("Telt"),I("Sovepose"),I("Liggeunderlag"),I("Turgåstavar"),I("Hovudlykt + reserve-batteri"),I("Kart & kompass"),I("Vassreinsing / filter"),I("Primus + gass")]:[]),
      ...(bp?[I("Ryggsekk (hovud)"),I("Soveliner"),I("Reisehåndkle"),I("Hengelås (til låsbare skap)"),I("Hovudlykt"),I("Liten dagssekk")]:[]),
      ...(city?[I("Dagssekk / lita veske"),I("Komfortable spasersko"),I("Kompakt paraply")]:[]),
      ...(road?[I("Vegkart / frakopla GPS"),I("Pledd til bilen"),I("Nødutstyr til bil")]:[]),
      ...(overnight?[I("Overnatningsveske")]:[]),
    ]},
    {id:"electronics",label:"Elektronikk",items:[
      I("Mobil + ladar"),I("Powerbank"),
      ...(!overnight?[I("Reiseadapter (om nødvendig)")]:[]),
      ...(road?[I("Billader")]:[]),
      ...(hike||bp?[I("Kart lasta ned utan nett")]:[]),
      I("Pulsklokke og ladar"),I("Pulsbelte"),
      ...(noTent?[I("Earbuds"),I("Laptop og ladar")]:[]),
    ]},
    {id:"hygge",label:"Hygge",items:[
      I("Bok eller kindle"),I("Bujo"),
      ...(road?[I("Spelelister / podkastar lasta ned")]:[]),
    ]},
    {id:"peace",label:"Ro i sjela",items:[
      I("Bujo"),I("ID / pass"),I("Billettar & bestillingsstadfestingar"),I("Betalingskort"),
    ]},
  ];
}

const DEF_DEPART=[
  {id:"dp1",text:"Mobil fulladd",checked:false},
  {id:"dp2",text:"Nokon heime veit planen din",checked:false},
  {id:"dp3",text:"Billettar & stadfestingar tilgjengelege på mobil",checked:false},
  {id:"dp4",text:"Vassflaske fylt opp",checked:false},
];
const buildFood=days=>({breakfasts:days,lunches:days,dinners:days,snacks:days*2,packedBreakfasts:0,packedLunches:0,packedDinners:0,packedSnacks:0,restaurants:[],notes:""});
const DEF_PROFILE={meds:[],supplements:[]};
const MEALS=[{key:"breakfasts",pk:"packedBreakfasts",label:"Frukost"},{key:"lunches",pk:"packedLunches",label:"Lunsj"},{key:"dinners",pk:"packedDinners",label:"Middag"},{key:"snacks",pk:"packedSnacks",label:"Snacks"}];

function dragReorder(items,from,to){const n=[...items];const[m]=n.splice(from,1);n.splice(to,0,m);return n;}

function calcProgress(trip){
  const cats=trip.categories||[],food=trip.food||buildFood(trip.days),dept=trip.departItems||DEF_DEPART.map(i=>({...i,checked:false}));
  const st=cats.reduce((a,c)=>a+c.items.length,0),sd=cats.reduce((a,c)=>a+c.items.filter(i=>i.checked).length,0);
  const fd=MEALS.filter(m=>(food[m.pk]||0)>=(food[m.key]||0)&&(food[m.key]||0)>0).length;
  const dd=dept.filter(i=>i.checked).length;
  return {overall:Math.round(((st>0?sd/st:0)*0.6+(fd/MEALS.length)*0.25+(dept.length>0?dd/dept.length:0)*0.15)*100),stuffDone:sd,stuffTotal:st,foodDone:fd,foodTotal:MEALS.length,deptDone:dd,deptTotal:dept.length};
}

function ProfileView({profile,setProfile}){
  const addMed=()=>setProfile(p=>({...p,meds:[...p.meds,{id:uid(),name:"",perDay:1,unit:"tablettar",buffer:1}]}));
  const updMed=(id,f,v)=>setProfile(p=>({...p,meds:p.meds.map(m=>m.id===id?{...m,[f]:v}:m)}));
  const delMed=id=>setProfile(p=>({...p,meds:p.meds.filter(m=>m.id!==id)}));
  const addSup=()=>setProfile(p=>({...p,supplements:[...p.supplements,{id:uid(),name:"",perDay:1,unit:"kapslar"}]}));
  const updSup=(id,f,v)=>setProfile(p=>({...p,supplements:p.supplements.map(s=>s.id===id?{...s,[f]:v}:s)}));
  const delSup=id=>setProfile(p=>({...p,supplements:p.supplements.filter(s=>s.id!==id)}));
  return(<div className="vpad"><p className="vintro">Set ein gong — vert brukt på alle turar automatisk.</p>
    <div className="fg"><div className="gl">Reseptmedisinar</div>
      {profile.meds.map(m=>(<div key={m.id} className="hb">
        <input className="fi" placeholder="Namn på medisin" value={m.name} onChange={e=>updMed(m.id,"name",e.target.value)}/>
        <div className="ifs"><span className="fl">Per dag</span><input className="fi num" type="number" min="0.5" step="0.5" value={m.perDay} onChange={e=>updMed(m.id,"perDay",parseFloat(e.target.value)||1)}/><span className="fl">Eining</span><input className="fi sh" placeholder="tablettar" value={m.unit} onChange={e=>updMed(m.id,"unit",e.target.value)}/><span className="fl">Buffer</span><input className="fi num" type="number" min="0" value={m.buffer} onChange={e=>updMed(m.id,"buffer",parseInt(e.target.value)||0)}/></div>
        <button className="tb danger" onClick={()=>delMed(m.id)}>Fjern</button>
      </div>))}
      <button className="db" onClick={addMed}>+ Legg til medisin</button>
    </div>
    <div className="fg"><div className="gl">Kosttilskot</div>
      {profile.supplements.map(s=>(<div key={s.id} className="hb">
        <input className="fi" placeholder="Namn på tilskot" value={s.name} onChange={e=>updSup(s.id,"name",e.target.value)}/>
        <div className="ifs"><span className="fl">Per dag</span><input className="fi num" type="number" min="1" value={s.perDay} onChange={e=>updSup(s.id,"perDay",parseInt(e.target.value)||1)}/><span className="fl">Eining</span><input className="fi sh" placeholder="kapslar" value={s.unit} onChange={e=>updSup(s.id,"unit",e.target.value)}/></div>
        <button className="tb danger" onClick={()=>delSup(s.id)}>Fjern</button>
      </div>))}
      <button className="db" onClick={addSup}>+ Legg til kosttilskot</button>
    </div>
  </div>);
}

function TripTypesView({tripTypes,setTripTypes}){
  const [adding,setAdding]=useState(false),[newName,setNewName]=useState(""),[newIcon,setNewIcon]=useState(ICON_KEYS[0]);
  const [cloneFrom,setCloneFrom]=useState(tripTypes[0]?.id||""),[editingId,setEditingId]=useState(null),[editName,setEditName]=useState("");
  const startEdit=tt=>{setEditingId(tt.id);setEditName(tt.name);};
  const saveEdit=id=>{setTripTypes(p=>p.map(t=>t.id===id?{...t,name:editName.trim()||t.name}:t));setEditingId(null);};
  const addType=()=>{if(!newName.trim())return;setTripTypes(p=>[...p,{id:uid(),name:newName.trim(),icon:newIcon,cloneFrom}]);setNewName("");setAdding(false);};
  return(<div className="vpad"><p className="vintro">Endre namn, fjern eller legg til turtypar.</p>
    <div className="fg"><div className="gl">Turtypar</div>
      {tripTypes.map(tt=>(<div key={tt.id} className="tt-row">
        <TripIcon iconKey={tt.icon} size={32}/>
        {editingId===tt.id?<input className="fi" style={{flex:1}} value={editName} onChange={e=>setEditName(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")saveEdit(tt.id);if(e.key==="Escape")setEditingId(null);}} onBlur={()=>saveEdit(tt.id)} autoFocus/>:<span className="tt-name" onDoubleClick={()=>startEdit(tt)}>{tt.name}</span>}
        <button className="tb" onClick={()=>startEdit(tt)} style={{fontSize:11,marginLeft:4}}>endre</button>
        {tripTypes.length>1&&<button className="tb danger" onClick={()=>setTripTypes(p=>p.filter(t=>t.id!==tt.id))}>fjern</button>}
      </div>))}
    </div>
    {adding?(<div className="fg"><div className="gl">Ny turtype</div>
      <input className="fi" placeholder="Namn (t.d. Sydentur)" value={newName} onChange={e=>setNewName(e.target.value)} autoFocus/>
      <div className="gl" style={{marginTop:12}}>Vel ikon</div>
      <div className="icon-picker">{ICON_KEYS.map(k=>(<button key={k} className={`ip-btn ${newIcon===k?"on":""}`} onClick={()=>setNewIcon(k)} title={ICON_DEFS[k].label}><TripIcon iconKey={k} size={28}/></button>))}</div>
      <div className="gl" style={{marginTop:12}}>Klon pakkeliste frå</div>
      <select className="fi" value={cloneFrom} onChange={e=>setCloneFrom(e.target.value)}>{tripTypes.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}</select>
      <div className="fbs" style={{marginTop:10}}><button className="pb" onClick={addType}>Legg til turtype</button><button className="gb" onClick={()=>setAdding(false)}>Avbryt</button></div>
    </div>):<button className="pb full" onClick={()=>setAdding(true)}>+ Legg til turtype</button>}
  </div>);
}

function NewTripForm({tripTypes,templates,profile,onSave,onCancel}){
  const [name,setName]=useState(""),[ttId,setTtId]=useState(tripTypes[0]?.id||""),[sea,setSea]=useState(SEASONS[0]),[days,setDays]=useState(3);
  const selTt=tripTypes.find(t=>t.id===ttId)||tripTypes[0];
  const save=()=>{
    if(!name.trim())return;
    const d=parseInt(days)||1,tt=tripTypes.find(t=>t.id===ttId)||tripTypes[0],key=`${ttId}__${sea}`;
    let cats;
    if(templates[key])cats=templates[key].map(c=>({...c,items:c.items.map(i=>({...i,id:uid(),checked:false}))}));
    else if(tt.cloneFrom){const sk=`${tt.cloneFrom}__${sea}`;cats=templates[sk]?templates[sk].map(c=>({...c,items:c.items.map(i=>({...i,id:uid(),checked:false}))})):buildCats(tt.cloneFrom,sea,d);}
    else cats=buildCats(ttId,sea,d);
    const wh=cats.map(c=>{if(c.id!=="toiletries")return c;return{...c,items:[...c.items,...profile.meds.filter(m=>m.name).map(m=>({id:uid(),checked:false,text:`${m.name}: ${Math.ceil(m.perDay*d)+(m.buffer||0)} ${m.unit}`})),...profile.supplements.filter(s=>s.name).map(s=>({id:uid(),checked:false,text:`${s.name}: ${Math.ceil(s.perDay*d)} ${s.unit}`}))]};});
    const deptKey=`${ttId}__${sea}__depart`;
    const deptItems=templates[deptKey]?templates[deptKey].map(i=>({...i,id:uid(),checked:false})):DEF_DEPART.map(i=>({...i,checked:false}));
    onSave({id:uid(),name:name.trim(),tripTypeId:ttId,season:sea,days:d,categories:wh,food:buildFood(d),departItems:deptItems});
  };
  return(<div className="ntf">
    <div className="gl" style={{marginBottom:12}}>Ny tur</div>
    <input className="fi" placeholder="Turnamn (t.d. Bergen-helg)" value={name} onChange={e=>setName(e.target.value)} autoFocus/>
    <div className="gl" style={{marginTop:4}}>Turtype</div>
    <div className="og">{tripTypes.map(t=>(<button key={t.id} className={`ob ${ttId===t.id?"on":""}`} onClick={()=>setTtId(t.id)}><div style={{display:"flex",justifyContent:"center",marginBottom:4}}><TripIcon iconKey={t.icon} size={24} a={ttId===t.id?"#eef3ea":DT_A} b={ttId===t.id?"#eef3ea":DT_B}/></div>{t.name}</button>))}</div>
    <div className="og two" style={{marginTop:4}}>{SEASONS.map(s=><button key={s} className={`ob ${sea===s?"on":""}`} onClick={()=>setSea(s)}>{s}</button>)}</div>
    <div className="ifs"><span className="fl">Dagar vekke</span><input className="fi num" type="number" min="1" value={days} onChange={e=>setDays(e.target.value)}/></div>
    {templates[`${ttId}__${sea}`]&&<div className="tn">Brukar lagra mal for {selTt?.name} / {sea}</div>}
    <div className="fbs"><button className="pb" onClick={save}>Opprett tur</button><button className="gb" onClick={onCancel}>Avbryt</button></div>
  </div>);
}

function TripDetail({trip,setTrips,profile,tripTypes,templates,setTemplates,onBack}){
  const [tab,setTab]=useState("ting"),[open,setOpen]=useState(()=>{const o={};(trip.categories||[]).forEach(c=>{o[c.id]=true;});return o;});
  const [newItems,setNewItems]=useState({}),[editing,setEditing]=useState(null),[editTxt,setEditTxt]=useState(""),[askSave,setAskSave]=useState(false);
  const dragState=useRef({});
  const upd=fn=>setTrips(p=>p.map(t=>t.id===trip.id?fn(t):t));
  const updF=fn=>upd(t=>({...t,food:fn(t.food||buildFood(t.days))}));
  const updD=fn=>upd(t=>({...t,departItems:fn(t.departItems||DEF_DEPART.map(i=>({...i,checked:false})))}));
  const food=trip.food||buildFood(trip.days),dept=trip.departItems||DEF_DEPART.map(i=>({...i,checked:false}));
  const isSorted=m=>(food[m.pk]||0)>=(food[m.key]||0)&&(food[m.key]||0)>0;
  const toggleCat=cid=>{const cat=(trip.categories||[]).find(c=>c.id===cid);if(!cat)return;const all=cat.items.length>0&&cat.items.every(i=>i.checked);upd(t=>({...t,categories:t.categories.map(c=>c.id!==cid?c:{...c,items:c.items.map(i=>({...i,checked:!all}))})}));};
  const toggleItem=(cid,iid)=>upd(t=>({...t,categories:t.categories.map(c=>c.id!==cid?c:{...c,items:c.items.map(i=>i.id===iid?{...i,checked:!i.checked}:i)})}));
  const delItem=(cid,iid)=>upd(t=>({...t,categories:t.categories.map(c=>c.id!==cid?c:{...c,items:c.items.filter(i=>i.id!==iid)})}));
  const addItem=cid=>{const t=(newItems[cid]||"").trim();if(!t)return;upd(tr=>({...tr,categories:tr.categories.map(c=>c.id!==cid?c:{...c,items:[...c.items,{id:uid(),text:t,checked:false}]})}));setNewItems(p=>({...p,[cid]:""}));};
  const saveEdit=()=>{if(!editing||!editTxt.trim())return;upd(t=>({...t,categories:t.categories.map(c=>c.id!==editing.cid?c:{...c,items:c.items.map(i=>i.id!==editing.iid?i:{...i,text:editTxt.trim()})})}));setEditing(null);setEditTxt("");};
  const makeDrag=(key,getList,setList)=>(idx)=>({draggable:true,onDragStart:()=>{dragState.current[key]={from:idx};},onDragEnter:()=>{if(dragState.current[key])dragState.current[key].to=idx;},onDragOver:e=>e.preventDefault(),onDragEnd:()=>{const s=dragState.current[key];if(!s||s.from===undefined||s.to===undefined||s.from===s.to){dragState.current[key]=null;return;}setList(dragReorder(getList(),s.from,s.to));dragState.current[key]=null;}});
  const catDrag=makeDrag("cats",()=>trip.categories||[],cats=>upd(t=>({...t,categories:cats})));
  const deptDrag=makeDrag("dept",()=>dept,items=>updD(()=>items));
  const itemDrag=cid=>makeDrag(`i_${cid}`,()=>(trip.categories||[]).find(c=>c.id===cid)?.items||[],items=>upd(t=>({...t,categories:t.categories.map(c=>c.id!==cid?c:{...c,items})})));
  const prog=calcProgress(trip),tt=tripTypes.find(t=>t.id===trip.tripTypeId)||{icon:"house",name:""};

  return(<div className="dw">

    <div className="dh">
      <div className="dhl">

        <div className="dm">{trip.days} {trip.days===1?"dag":"dagar"} vekke &middot; {tt.name} &middot; {trip.season}</div>
        <div className="dpw"><div className="dpt"><div className="dpf" style={{width:prog.overall+"%"}}/></div><span className="dpl">{prog.overall}%</span></div>
        <div className="prog-breakdown"><span>Ting {prog.stuffDone}/{prog.stuffTotal}</span><span>Mat {prog.foodDone}/{prog.foodTotal}</span><span>Avreise {prog.deptDone}/{prog.deptTotal}</span></div>
      </div>
      <TripIcon iconKey={tt.icon} size={52}/>
    </div>
    <div className="tabrow">{[["ting","Ting"],["mat","Mat"],["avreise","Avreise"]].map(([id,lbl])=><button key={id} className={`tp ${tab===id?"on":""}`} onClick={()=>setTab(id)}>{lbl}</button>)}</div>

            <button className={`cat-ck ${allDone?"on":cd>0?"partial":""}`} onClick={e=>{e.stopPropagation();toggleCat(cat.id);}}>{allDone?"✓":cd>0?"–":""}</button>

              <span className="cl">{cat.label}</span>

          </div>

            {cat.items.map((item,ii)=>{
              const isEd=editing&&editing.cid===cat.id&&editing.iid===item.id;
              return(<div key={item.id} className={`row ${item.checked?"done":""}`} {...idrg(ii)}>

                {isEd?<input className="fi ie" value={editTxt} onChange={e=>setEditTxt(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")saveEdit();if(e.key==="Escape")setEditing(null);}} onBlur={saveEdit} autoFocus/>:<span className="ct" onDoubleClick={()=>{setEditing({cid:cat.id,iid:item.id});setEditTxt(item.text);}}>{item.text}</span>}
                <button className="xb" onClick={()=>delItem(cat.id,item.id)}>×</button>
              </div>);
            })}
            <div className="ai"><input className="fi" placeholder="Legg til element…" value={newItems[cat.id]||""} onChange={e=>setNewItems(p=>({...p,[cat.id]:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&addItem(cat.id)}/><button className="smb" onClick={()=>addItem(cat.id)}>Legg til</button></div>
          </div>}
        </div>);
      })}
    </div>}

    {tab==="mat"&&<div className="fbd">

            <div className="md"/>
            <div className="mcol"><div className="msb">Planlagt</div><div className="mst"><button onClick={()=>updF(f=>({...f,[m.pk]:Math.max(0,(f[m.pk]||0)-1)}))}>−</button><span className={s?"dn":""}>{done}</span><button onClick={()=>updF(f=>({...f,[m.pk]:(f[m.pk]||0)+1}))}>+</button></div></div>
          </div>
          {s&&<div className="mok">ordna</div>}

      <div className="fg" style={{marginTop:22}}><div className="gl">Restaurantar å sjekke</div>

          <div className="rrt"><button className={`cfb ${r.confirmed?"on":""}`} onClick={()=>updR(r.id,"confirmed",!r.confirmed)}>{r.confirmed?"Trygg":"Stadfest?"}</button><button className="xb" onClick={()=>delR(r.id)}>×</button></div>
        </div>))}
        <button className="db" onClick={addRest}>+ Legg til restaurant</button>
      </div>
      <div className="fg" style={{marginTop:12}}><div className="gl">Notat</div>

    {tab==="avreise"&&<div className="dbd">

      <div className="ds"><div className="dsh">Mat</div>

      </div>

        {dept.map((item,idx)=>(<div key={item.id} className={`row dep-row ${item.checked?"done":""}`} {...deptDrag(idx)}>

        <button className="db" style={{marginTop:8}} onClick={()=>updD(items=>[...items,{id:uid(),text:"",checked:false}])}>+ Legg til punkt</button>
      </div>
      <div className="df">Klar. God tur.</div>
    </div>}
  </div>);
}

function TripsView({trips,setTrips,profile,tripTypes,templates,setTemplates}){
  const [activeId,setActiveId]=useState(null),[adding,setAdding]=useState(false);
  const trip=trips.find(t=>t.id===activeId);
  const save=t=>{setTrips(p=>[...p,t]);setActiveId(t.id);setAdding(false);};
  const del=id=>{setTrips(p=>p.filter(t=>t.id!==id));if(activeId===id)setActiveId(null);};
  if(trip)return <TripDetail trip={trip} setTrips={setTrips} profile={profile} tripTypes={tripTypes} templates={templates} setTemplates={setTemplates} onBack={()=>setActiveId(null)}/>;
  return(<div className="vpad">
    <div className="tl">
      {trips.length===0&&<div className="em">Ingen turar enno. Opprett ein nedanfor.</div>}
      {trips.map(t=>{const prog=calcProgress(t),tt=tripTypes.find(x=>x.id===t.tripTypeId)||{icon:"house",name:t.tripTypeId};return(<div key={t.id} className="trow" onClick={()=>setActiveId(t.id)}>
        <TripIcon iconKey={tt.icon} size={36}/>
        <div className="trb"><div className="trn">{t.name}</div><div className="trm">{t.days} {t.days===1?"dag":"d"} &middot; {tt.name} &middot; {t.season}</div><div className="mb"><div className="mf" style={{width:prog.overall+"%"}}/></div></div>
        <button className="xb" onClick={e=>{e.stopPropagation();del(t.id);}}>×</button>
      </div>);})}
    </div>
    {adding?<NewTripForm tripTypes={tripTypes} templates={templates} profile={profile} onSave={save} onCancel={()=>setAdding(false)}/>:<button className="pb full" onClick={()=>setAdding(true)}>+ Ny tur</button>}
  </div>);
}

      .cat-ck.on{background:var(--ac);border-color:var(--ac);}
      .cat-ck.partial{background:var(--al);border-color:var(--ac);color:var(--ac);}
      .cl{flex:1;font-family:monospace;font-size:10px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--mid);text-align:left;}
      .cb2.complete .cl{color:var(--ac);}
      .cc{font-family:monospace;font-size:10px;color:var(--mu);}
      .cdb{font-family:monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ac);background:var(--al);padding:2px 8px;border-radius:10px;}
      .cv{font-size:18px;color:var(--mu);width:16px;text-align:center;}
      .cbdy{padding:2px 10px 12px;border-top:1px solid var(--ru);}
      .cb2.complete .cbdy{border-top-color:var(--al);}
      .row{display:flex;align-items:center;gap:8px;padding:8px 4px;border-bottom:1px solid #ede9d8;}
      .row:last-of-type{border-bottom:none;}
      .row.done{opacity:.45;}
      .row.done .ct{text-decoration:line-through;}
      .ck{width:17px;height:17px;border:1.5px solid var(--ru);border-radius:2px;background:var(--wh);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--wh);flex-shrink:0;cursor:pointer;}
      .ck.on{background:var(--ac);border-color:var(--ac);}
      .ck.partial{background:var(--al);border-color:var(--ac);color:var(--ac);font-size:13px;}
      .ct{flex:1;font-size:14px;line-height:1.3;}
      .ai{display:flex;gap:6px;margin-top:10px;padding:0 4px;}
      .fbd{display:flex;flex-direction:column;}
      .mg{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
      .mc{border:1px solid var(--ru);border-radius:4px;background:var(--wh);padding:13px 11px 10px;display:flex;flex-direction:column;gap:10px;}
      .mc.sorted{border-color:var(--al);background:var(--ab);}
      .mlab{font-family:monospace;font-size:9px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--mu);}
      .mns{display:flex;align-items:stretch;}
      .mcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;}
      .md{width:1px;background:var(--ru);margin:0 8px;}
      .msb{font-family:monospace;font-size:9px;color:var(--mu);}
      .mst{display:flex;align-items:center;gap:7px;}
      .mst button{width:22px;height:22px;border:1px solid var(--ru);border-radius:2px;background:var(--su);font-size:15px;cursor:pointer;color:var(--mid);display:flex;align-items:center;justify-content:center;}
      .mst span{font-family:monospace;font-size:18px;font-weight:500;min-width:22px;text-align:center;}
      .dn{color:var(--ac);}
      .mok{font-family:monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ac);text-align:center;border-top:1px solid var(--al);padding-top:8px;}
      .rr{border:1px solid var(--ru);border-radius:4px;padding:11px;background:var(--wh);margin-bottom:7px;display:flex;gap:10px;align-items:flex-start;}
      .rr.conf{border-color:var(--al);background:var(--ab);}
      .rm{flex:1;display:flex;flex-direction:column;gap:6px;}
      .rrt{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;}
      .cfb{padding:5px 10px;border:1px solid var(--ru);border-radius:3px;background:none;font-family:monospace;font-size:9px;font-weight:500;cursor:pointer;color:var(--mu);white-space:nowrap;text-transform:uppercase;}
      .cfb.on{background:var(--ac);color:#fff;border-color:var(--ac);}
      .dbd{display:flex;flex-direction:column;gap:2px;}
      .ds{margin-bottom:16px;}
      .dsh{font-family:monospace;font-size:9px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--mu);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--ru);}
      .dwr{font-size:12px;color:#7a5020;background:#fdf5e6;border:1px solid #e8d4a0;border-radius:3px;padding:6px 10px;margin-top:6px;margin-bottom:4px;}
      .df{text-align:center;font-family:monospace;font-size:11px;color:var(--mu);padding:28px 0 8px;letter-spacing:2px;text-transform:uppercase;}
      .dep-row{cursor:default;}
    `}</style>
    <div className="app">
      <div className="app-header">
        <div className="ht"><div className="asub">Reise</div><div className="aname">KLAR</div></div>
        <div className="nav">
          <button className={`nb ${view==="turar"?"on":""}`} onClick={()=>setView("turar")}>Turar</button>
          <button className={`nb ${view==="helse"?"on":""}`} onClick={()=>setView("helse")}>Helse</button>
          <button className={`nb ${view==="turtypar"?"on":""}`} onClick={()=>setView("turtypar")}>Turtypar</button>
        </div>
      </div>
      {view==="turar"&&<TripsView trips={trips} setTrips={setTrips} profile={profile} tripTypes={tripTypes} templates={templates} setTemplates={setTemplates}/>}
      {view==="helse"&&<ProfileView profile={profile} setProfile={setProfile}/>}
      {view==="turtypar"&&<TripTypesView tripTypes={tripTypes} setTripTypes={setTripTypes}/>}
    </div>
  </>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
